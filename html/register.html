<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a new admin account for hiDeva. Get started with your admin workspace.">
  <title>Admin Registration | hiDeva</title>

  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/vendors/bootstrap-icons/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="auth-body">
  <button class="icon-button theme-toggle auth-theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" title="Switch color theme">
    <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
  </button>
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-brand" href="index.html"><span class="brand-icon"><i class="bi bi-grid-1x2-fill" aria-hidden="true"></i></span><span><strong>adminHMD</strong><small>Create your adminHMD account.</small></span></a>
      <div class="auth-visual"><img src="../assets/images/png/dasher-ui-bootstrap-5.jpg" alt="adminHMD dashboard interface"></div>
      <form class="needs-validation" novalidate>
        <div class="mb-4">
          <p class="eyebrow mb-1">Secure Access</p>
          <h1 class="h3 mb-1">Register</h1>
          <p class="text-muted mb-0">Create your adminHMD account.</p>
        </div>
        <div class="mb-3"><label class="form-label" for="registerName">Full name</label><input class="form-control" id="registerName" type="text" required><div class="invalid-feedback">Full name is required.</div></div>
        <div class="mb-3"><label class="form-label" for="registerEmail">Email address</label><input class="form-control" id="registerEmail" type="email" required><div class="invalid-feedback">Enter a valid email.</div></div>
        <div class="mb-3"><label class="form-label" for="registerPassword">Password</label><input class="form-control" id="registerPassword" type="password" minlength="6" required><div class="invalid-feedback">Password must be at least 6 characters.</div></div>
        <div class="form-check mb-4"><input class="form-check-input" type="checkbox" id="terms" required><label class="form-check-label" for="terms">I agree to the terms</label><div class="invalid-feedback">You must agree before continuing.</div></div>
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-person-plus" aria-hidden="true"></i> Create Account</button>
      </form>
      
      <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
  (function () {
    "use strict";
    var auth = window.adminHMD && window.adminHMD.auth;
    if (!auth) return;
    var form = document.querySelector(".needs-validation");
    if (!form) return;
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!form.checkValidity()) return;
      var name = document.getElementById("registerName").value;
      var email = document.getElementById("registerEmail").value;
      var password = document.getElementById("registerPassword").value;
      var btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Creating account...';
      auth.signUp(email, password, name).then(function (result) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus" aria-hidden="true"></i> Create Account';
        if (result.error) {
          alert(result.error.message);
        } else {
          alert("Account created! Check your email for a confirmation link.");
          window.location.href = "login.html";
        }
      });
    });
  })();
  </script>
</body>
</html>
